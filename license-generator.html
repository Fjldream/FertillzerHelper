<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>激活码生成工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      color: #1a1a2e;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #444;
      font-size: 14px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e4ff;
      border-radius: 8px;
      font-size: 14px;
      font-family: monospace;
      transition: border 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f0f4ff;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    .result-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }
    .result-value {
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      color: #333;
    }
    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
    }
    .alert-warn {
      background: #fff3e0;
      color: #f57c00;
      border-left: 4px solid #f57c00;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔑 激活码生成工具</h1>
    <p class="subtitle">仅供开发者使用 - 请妥善保管私钥</p>

    <div class="alert alert-warn">
      <strong>重要：</strong>此工具需要私钥文件（keys/private.pem）。请确保私钥安全，不要泄露给他人。
    </div>

    <div class="form-group">
      <label>用户机器码</label>
      <input type="text" id="machine-code" placeholder="例如：A1B2-C3D4-E5F6-G7H8">
    </div>

    <div class="form-group">
      <label>到期日期</label>
      <input type="date" id="expiry-date">
    </div>

    <div class="form-group">
      <label>私钥（../license-keys/private_pkcs8.pem 内容）</label>
      <textarea id="private-key" rows="10" placeholder="-----BEGIN PRIVATE KEY-----
...
-----END PRIVATE KEY-----"></textarea>
    </div>

    <button class="btn" onclick="generateLicense()">生成激活码</button>

    <div id="result" style="display:none" class="result">
      <div class="result-label">激活码（请发送给用户）：</div>
      <div class="result-value" id="license-output"></div>
      <button class="btn" style="margin-top:10px" onclick="copyLicense()">复制激活码</button>
    </div>
  </div>

  <script>
    // 设置默认到期日期为1年后
    const oneYearLater = new Date();
    oneYearLater.setFullYear(oneYearLater.getFullYear() + 1);
    document.getElementById('expiry-date').value = oneYearLater.toISOString().split('T')[0];

    async function generateLicense() {
      const machineCode = document.getElementById('machine-code').value.trim();
      const expiryDate = document.getElementById('expiry-date').value;
      const privateKeyPem = document.getElementById('private-key').value.trim();

      if (!machineCode || !expiryDate || !privateKeyPem) {
        alert('请填写所有字段');
        return;
      }

      try {
        // 导入私钥
        const privateKey = await crypto.subtle.importKey(
          'pkcs8',
          pemToArrayBuffer(privateKeyPem),
          { name: 'RSA-PSS', hash: 'SHA-256' },
          false,
          ['sign']
        );

        // 签名数据：machineCode|expiryDate
        const dataToSign = machineCode + '|' + expiryDate;
        const dataBuffer = new TextEncoder().encode(dataToSign);

        const signature = await crypto.subtle.sign(
          { name: 'RSA-PSS', saltLength: 32 },
          privateKey,
          dataBuffer
        );

        // 转为 base64
        const signatureArray = Array.from(new Uint8Array(signature));
        const signatureB64 = btoa(String.fromCharCode.apply(null, signatureArray));
        const expiryB64 = btoa(expiryDate);

        // 激活码格式：signature.expiry
        const licenseKey = signatureB64 + '.' + expiryB64;

        document.getElementById('license-output').textContent = licenseKey;
        document.getElementById('result').style.display = 'block';
      } catch (e) {
        alert('生成失败：' + e.message);
        console.error(e);
      }
    }

    function pemToArrayBuffer(pem) {
      const b64 = pem.replace(/-----BEGIN RSA PRIVATE KEY-----/, '')
                     .replace(/-----END RSA PRIVATE KEY-----/, '')
                     .replace(/-----BEGIN PRIVATE KEY-----/, '')
                     .replace(/-----END PRIVATE KEY-----/, '')
                     .replace(/\s/g, '');
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes.buffer;
    }

    function copyLicense() {
      const output = document.getElementById('license-output').textContent;
      navigator.clipboard.writeText(output).then(() => {
        alert('激活码已复制到剪贴板');
      });
    }
  </script>
</body>
</html>
